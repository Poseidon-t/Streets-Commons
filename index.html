    <!-- Schema.org Structured Data for FAQPage -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "FAQPage",
      "mainEntity": [
        {
          "@type": "Question",
          "name": "Is SafeStreets really free?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Yes! All 12 data layers — walkability metrics, neighborhood intelligence, compare mode, and field verification — are completely free with no sign-up required. We use open government data (NASA, Sentinel-2, US Census, CDC, FEMA, OpenStreetMap). Unlimited searches, works globally in 190+ countries."
          }
        },
        {
          "@type": "Question",
          "name": "How is SafeStreets different from Walk Score?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Walk Score measures proximity to nearby amenities. SafeStreets analyzes the actual neighborhood experience — terrain slope, tree canopy shade, crash history, transit access, food deserts, CDC health outcomes, and FEMA flood risk. We use real satellite imagery and government data, not just distance calculations. Plus, everything is free."
          }
        },
        {
          "@type": "Question",
          "name": "What data sources does SafeStreets use?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "We use research-grade open data: Sentinel-2 satellite imagery (tree canopy), NASADEM (terrain), OpenStreetMap (street infrastructure, transit, amenities), NHTSA FARS (US crash data), US Census ACS (commute patterns, demographics), CDC PLACES (health outcomes by census tract), FEMA NFHL (flood risk zones), and WHO (international safety data). These are the same sources used by governments and research institutions."
          }
        },
        {
          "@type": "Question",
          "name": "Do I need to create an account?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "No! All analysis features work instantly without any account. Sign in optionally to save addresses for quick access. Real estate agents can sign in to generate branded walkability reports for property listings."
          }
        },
        {
          "@type": "Question",
          "name": "What is Neighborhood Intelligence?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Neighborhood Intelligence goes beyond walkability to show how people actually live in an area: commute patterns (walk, bike, transit, car split), transit access, park and food access, CDC health outcomes compared to US averages, and FEMA flood risk zones. This data comes from the US Census, CDC PLACES, FEMA, and OpenStreetMap."
          }
        },
        {
          "@type": "Question",
          "name": "Does SafeStreets work in my city or country?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Yes! Walkability analysis works globally in 190+ countries using satellite data and OpenStreetMap. Neighborhood Intelligence features like commute data, health outcomes, and flood risk are US-only (powered by Census, CDC, and FEMA). International locations still get full walkability, transit, park, and food access analysis."
          }
        },
        {
          "@type": "Question",
          "name": "Can real estate agents use SafeStreets?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Yes! Agents can generate branded walkability reports with their name, company, and contact info for any property listing. The first 3 reports are free. Unlimited reports are available with a Pro account ($99 one-time)."
          }
        }
      ]
    }
    </script>
